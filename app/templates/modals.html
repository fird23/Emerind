<!-- Модальное окно для удаления блога -->
<div id="deleteBlogModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2><i class="fas fa-exclamation-triangle"></i> Подтверждение удаления</h2>
        <p>Вы действительно хотите удалить этот блог?</p>
        <div class="modal-actions">
            <form id="confirmDeleteBlogForm" method="post" action="">
                {% csrf_token %}
                <button type="submit" class="action-button danger-button">
                    <i class="fas fa-trash-alt"></i> Удалить
                </button>
            </form>
            <button id="cancelDeleteBlog" class="action-button">
                <i class="fas fa-times"></i> Отмена
            </button>
        </div>
    </div>
</div>

<!-- Модальное окно для удаления комментария -->

    <div class="modal-content">
        <span class="close">&times;</span>
        <h2><i class="fas fa-exclamation-triangle"></i> Подтверждение удаления</h2>

<!-- Модальное окно для редактирования комментария -->
<div id="editCommentModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2><i class="fas fa-edit"></i> Редактирование комментария</h2>
        <textarea id="editCommentText" class="edit-comment-textarea" rows="4"></textarea>
        <div class="modal-actions">
            <button id="confirmEditComment" class="action-button">
                <i class="fas fa-save"></i> Сохранить
            </button>
            <button id="cancelEditComment" class="action-button">
                <i class="fas fa-times"></i> Отмена
            </button>
        </div>
    </div>
</div>
